# Конфигурация backend «Цифровой Офис».
# Скопируйте в config.yaml и заполните секреты. Формат — только YAML, без .env.

service_name: digital-office-backend
host: 0.0.0.0
port: 8080                           # внешний прокси пропускает только этот порт
database_url: sqlite:///./storage/app.db
storage_dir: ./storage
log_level: INFO
# Раздача собранного фронтенда из того же процесса (один порт на API + UI).
frontend_dist: ""                    # пусто = ../frontend/dist относительно backend/
root_path: ""                        # префикс прокси, ЕСЛИ он не срезается (обычно "")
public_base_path: /jnserver/1109/application/  # внешний путь приложения
cors_origins:
  - http://localhost:5173
  - http://127.0.0.1:5173

security:
  api_key: ""                       # ключ для изменяющих запросов
  require_auth: false               # true -> POST/PUT/PATCH/DELETE требуют X-Api-Key

upload:
  max_mb: 1024
  allowed_extensions:
    - .mp3
    - .wav
    - .m4a
    - .ogg
    - .flac
    - .aac
    - .opus
    - .mp4
    - .mov
    - .mkv
    - .avi
    - .webm
    - .m4v

export:
  pdf_font_path: ""                 # TTF с кириллицей; пусто = автоопределение (Arial/DejaVu)

qa:
  max_context_chars: 24000          # обрезка контекста под промпт

execution_control:
  enabled: false                    # дублировать поручения во внешний сервис задач
  bulk_url: ""                      # напр. https://.../api/tasks/bulk
  api_key: ""
  request_timeout: 30

openrouter:
  base_url: https://openrouter.ai/api/v1
  api_key: ""                       # ключ OpenRouter
  asr_model: google/gemini-2.5-flash
  chunk_seconds: 600                # длинное аудио режется на куски по N секунд
  enable_diarization: true          # размечать говорящих (Спикер N)
  language: ru                      # подсказка языка для ASR
  request_timeout: 300

dify:
  base_url: https://dify.t1v.scibox.tech/v1
  app_api_key: ""                   # для /chat-messages (протокол / Q&A / обоснование)
  dataset_api_key: ""               # для Dataset API (историческая память)
  transcripts_dataset_id: ""        # датасет, куда складываются транскрипты
  response_mode: streaming          # streaming | blocking
  user: digital-office-backend
  request_timeout: 180
  # Команды-маршруты, совпадают с Question Classifier в workflow:
  command_protocol: "Извлечение протокола"
  command_qa: "Вопросы пользователя"
  command_justification: "Справка-обоснование"
  command_memo: "Создание справки(служебной записки)"

max:
  enabled: false                    # включить MAX-бота (кнопки подтверждения + напоминания)
  api_base_url: https://platform-api.max.ru
  bot_token: ""                     # токен бота MAX
  chat_id: ""                       # ID ГРУППЫ MAX (у групп он отрицательный, напр. -74989259735800)
  webhook_secret: ""                # секрет вебхука: MAX должен звать /api/max/webhook?secret=...
  # напоминания о приближении срока:
  reminder_lead_minutes: 60         # за сколько минут до дедлайна напомнить
  reminder_scan_seconds: 60         # период опроса задач планировщиком
  default_deadline_time: "18:00"    # время, если в дедлайне указана только дата
  timezone: Europe/Moscow
  request_timeout: 60
  # legacy-мост к отдельному microservice (обычно не нужен, MAX-логика теперь в backend):
  base_url: ""
  api_key: ""

google_sheets:
  enabled: false                    # реестр поручений в Google Таблице (Apps Script Web App)
  webapp_url: ""                    # URL Apps Script (.../exec)
  script_token: ""                  # токен, который проверяет скрипт
  request_timeout: 30

media:
  ffmpeg_path: ffmpeg               # путь к ffmpeg (для видео -> аудио)
