<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Цифровой Офис</title>
    <meta name="description" content="Цифровой Офис — встречи, протоколы и реестр поручений аппарата." />
    <!-- Локальный favicon (data-URI: без внешних запросов, не зависит от base-path прокси). -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231E4FA8'/%3E%3Cpath d='M9 16.5l4.6 4.6L23 11' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <!-- Цвет системной шапки браузера под обе темы. -->
    <meta name="theme-color" content="#F1F4F8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0C1015" media="(prefers-color-scheme: dark)" />
    <script>
      // Применяем тему до рендера, чтобы избежать мигания.
      (function () {
        var t = localStorage.getItem("theme");
        if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
