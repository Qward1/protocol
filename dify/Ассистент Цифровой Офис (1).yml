    - data:
        code: "import re\nimport json\nimport uuid\nfrom datetime import datetime\n\
          \ndef to_dict(value):\n    if isinstance(value, dict):\n        return value\n\
          \n    if isinstance(value, str):\n        text = value.strip()\n       \
          \ text = text.replace(\"```json\", \"\").replace(\"```\", \"\").strip()\n\
          \        try:\n            parsed = json.loads(text)\n            if isinstance(parsed,\
          \ dict):\n                return parsed\n        except Exception:\n   \
          \         pass\n\n    return {}\n\ndef norm_date(value):\n    if not value:\n\
          \        return \"\"\n\n    text = str(value).strip()\n\n    patterns =\
          \ [\n        (\"%Y-%m-%d\", r\"\\d{4}-\\d{2}-\\d{2}\"),\n        (\"%d.%m.%Y\"\
          , r\"\\d{2}\\.\\d{2}\\.\\d{4}\")\n    ]\n\n    for fmt, pattern in patterns:\n\
          \        m = re.search(pattern, text)\n        if m:\n            try:\n\
          \                return datetime.strptime(m.group(0), fmt).strftime(\"%Y-%m-%d\"\
          )\n            except Exception:\n                pass\n\n    return text\n\
          \ndef main(protocol_data):\n    data = to_dict(protocol_data)\n\n    protocol_date\
          \ = norm_date(data.get(\"protocol_date\", \"\"))\n    meeting_title = str(data.get(\"\
          meeting_title\", \"\")).strip()\n\n    raw_tasks = data.get(\"tasks\", [])\n\
          \    if not isinstance(raw_tasks, list):\n        raw_tasks = []\n\n   \
          \ normalized = []\n\n    for item in raw_tasks:\n        if not isinstance(item,\
          \ dict):\n            continue\n\n        task_text = str(item.get(\"task\"\
          , \"\")).strip()\n        if not task_text:\n            continue\n\n  \
          \      normalized.append({\n            \"id\": str(uuid.uuid4()),\n   \
          \         \"protocol_date\": protocol_date,\n            \"protocol_number\"\
          : str(data.get(\"protocol_number\", \"\")).strip(),\n            \"meeting_title\"\
          : meeting_title,\n            \"task\": task_text,\n            \"responsible\"\
          : str(item.get(\"raw_responsible\", \"\")).strip(),\n            \"due_date\"\
          : str(item.get(\"raw_due_date\", \"\")).strip(),\n            \"department_hint\"\
          : str(item.get(\"department_hint\", \"\")).strip(),\n            \"source_fragment\"\
          : str(item.get(\"source_fragment\", \"\")).strip()\n        })\n\n    data[\"\
          protocol_date\"] = protocol_date\n    data[\"tasks\"] = normalized\n\n \
          \   return {\n        \"tasks\": normalized,\n        \"protocol_data\"\
          : data,\n        \"count\": len(normalized)\n    }"
        code_language: python3
