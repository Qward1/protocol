          : \"needs_review\",\n            \"confidence\": 0,\n            \"reason\"\
          : \"Не удалось получить результат ни из одной ветки\",\n            \"source_fragment\"\
          : \"\"\n        }\n\n    return {\n        \"task_result_json\": json.dumps(result,\
          \ ensure_ascii=False)\n    }"
