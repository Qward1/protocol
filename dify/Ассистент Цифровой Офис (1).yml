    - data:
        code: "import json\n\n\ndef parse_item(item):\n    if not item:\n        return\
          \ None\n\n    if isinstance(item, dict):\n        return item\n\n    if\
          \ isinstance(item, str):\n        text = item.strip()\n        text = text.replace(\"\
          ```json\", \"\").replace(\"```\", \"\").strip()\n\n        try:\n      \
          \      parsed = json.loads(text)\n            if isinstance(parsed, dict):\n\
          \                return parsed\n        except Exception:\n            pass\n\
          \n        start = text.find(\"{\")\n        end = text.rfind(\"}\")\n\n\
          \        if start >= 0 and end > start:\n            try:\n            \
          \    parsed = json.loads(text[start:end + 1])\n                if isinstance(parsed,\
          \ dict):\n                    return parsed\n            except Exception:\n\
          \                pass\n\n    return None\n\n\ndef value(item, *keys, default=\"\
          \"):\n    for key in keys:\n        if key in item and item.get(key) is\
          \ not None:\n            return item.get(key)\n    return default\n\n\n\
          def normalize_task(t):\n    confidence = value(t, \"confidence\", default=0)\n\
          \n    try:\n        confidence = float(confidence)\n    except Exception:\n\
          \        confidence = 0\n\n    return {\n        \"id\": str(value(t, \"\
          id\")),\n        \"protocol_date\": str(value(t, \"protocol_date\")),\n\
          \        \"meeting_title\": str(value(t, \"meeting_title\")),\n        \"\
          assignment\": str(value(t, \"assignment\", \"task\")),\n        \"responsible\"\
          : str(value(t, \"responsible\")),\n        \"department\": str(value(t,\
          \ \"department\")),\n        \"zta\": str(value(t, \"zta\", \"zga\")),\n\
          \        \"zta_sheet\": str(value(t, \"zta_sheet\", \"zga_sheet\")),\n \
          \       \"deadline\": str(value(t, \"deadline\", \"due_date\")),\n     \
          \   \"status\": str(value(t, \"status\", default=\"Новое\")),\n        \"\
          deadline_source\": str(value(t, \"deadline_source\", \"due_source\")),\n\
          \        \"confidence\": confidence,\n        \"reason_comment\": str(value(t,\
          \ \"reason_comment\", \"reason\")),\n        \"source_fragment\": str(value(t,\
          \ \"source_fragment\")),\n        \"max_username\": str(value(t, \"max_username\"\
          ))\n    }\n\n\ndef main(iteration_results):\n    raw_tasks = []\n\n    if\
          \ isinstance(iteration_results, str):\n        try:\n            parsed\
          \ = json.loads(iteration_results)\n            if isinstance(parsed, list):\n\
          \                iteration_results = parsed\n            else:\n       \
          \         iteration_results = []\n        except Exception:\n          \
          \  iteration_results = []\n\n    for item in iteration_results or []:\n\
          \        parsed = parse_item(item)\n        if parsed:\n            raw_tasks.append(parsed)\n\
          \n    tasks = [normalize_task(t) for t in raw_tasks]\n\n    preview_lines\
          \ = []\n\n    for t in tasks[:10]:\n        preview_lines.append(\n    \
          \        f\"- {t.get('assignment', '')} — {t.get('responsible', '')}, срок:\
          \ {t.get('deadline', '')}, лист: {t.get('zta_sheet', '')}\"\n        )\n\
          \n    payload_json = json.dumps({\n        \"tasks\": tasks\n    }, ensure_ascii=False)\n\
          \n    return {\n        \"tasks_json\": json.dumps(tasks, ensure_ascii=False),\n\
          \        \"payload_json\": payload_json,\n        \"count\": len(tasks),\n\
          \        \"preview\": \"\\n\".join(preview_lines)\n    }"
