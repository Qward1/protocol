    - data:
        code: "import json\nfrom datetime import datetime\n\ndef to_dict(value):\n\
          \    if isinstance(value, dict):\n        return value\n    if isinstance(value,\
          \ str):\n        try:\n            return json.loads(value)\n        except\
          \ Exception:\n            return {}\n    return {}\n\ndef to_list(value):\n\
          \    if isinstance(value, list):\n        return value\n    if isinstance(value,\
          \ str):\n        try:\n            parsed = json.loads(value)\n        \
          \    if isinstance(parsed, list):\n                return parsed\n     \
          \   except Exception:\n            return []\n    return []\n\ndef format_date_ru(value):\n\
          \    if not value:\n        return \"\"\n    text = str(value).strip()\n\
          \    try:\n        return datetime.strptime(text, \"%Y-%m-%d\").strftime(\"\
          %d.%m.%Y\")\n    except Exception:\n        return text\n\ndef main(protocol_data,\
          \ tasks):\n    data = to_dict(protocol_data)\n    final_tasks = to_list(tasks)\n\
          \n    attendees = data.get(\"attendees\", [])\n    if not isinstance(attendees,\
          \ list):\n        attendees = []\n\n    attendees_block = \"\\n\".join(\n\
          \        [f\"{i + 1}. {name}\" for i, name in enumerate(attendees)]\n  \
          \  )\n\n    decisions_lines = []\n    for i, t in enumerate(final_tasks,\
          \ start=1):\n        if not isinstance(t, dict):\n            continue\n\
          \n        decisions_lines.append(\n            f\"{i}. {t.get('task', '')}.\\\
          n\"\n            f\"Ответственный: {t.get('responsible', '')}.\\n\"\n  \
          \          f\"Срок: {format_date_ru(t.get('due_date', ''))}.\"\n       \
          \ )\n\n    decisions_block = \"\\n\".join(decisions_lines)\n\n    variables\
          \ = {\n        \"approver_position\": data.get(\"approver_position\") or\
          \ \"Глава городского округа Долгопрудный\",\n        \"approver_name\":\
          \ data.get(\"approver_name\") or \"О.А. Сотник\",\n        \"protocol_title\"\
          : \"ПРОТОКОЛ\",\n        \"meeting_title\": data.get(\"meeting_title\")\
          \ or \"по совещанию\",\n        \"protocol_date\": format_date_ru(data.get(\"\
          protocol_date\", \"\")),\n        \"protocol_number\": data.get(\"protocol_number\"\
          ) or \"\",\n        \"attendees_block\": attendees_block,\n        \"decisions_block\"\
          : decisions_block,\n        \"secretary\": data.get(\"secretary\") or \"\
          \"\n    }\n\n    return {\n        \"docx_variables\": json.dumps(variables,\
          \ ensure_ascii=False)\n    }"
