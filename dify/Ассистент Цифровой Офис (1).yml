    - data:
        code: "import json\n\ndef to_dict(value):\n    if not value:\n        return\
          \ {}\n\n    if isinstance(value, dict):\n        return value\n\n    if\
          \ isinstance(value, str):\n        text = value.strip()\n        text =\
          \ text.replace(\"```json\", \"\").replace(\"```\", \"\").strip()\n\n   \
          \     try:\n            parsed = json.loads(text)\n            if isinstance(parsed,\
          \ dict):\n                return parsed\n        except Exception:\n   \
          \         pass\n\n        start = text.find(\"{\")\n        end = text.rfind(\"\
          }\")\n        if start >= 0 and end > start:\n            try:\n       \
          \         parsed = json.loads(text[start:end + 1])\n                if isinstance(parsed,\
          \ dict):\n                    return parsed\n            except Exception:\n\
          \                pass\n\n    return {}\n\ndef main(without_kb_result=\"\"\
          , from_kb_result=\"\"):\n    without_kb = to_dict(without_kb_result)\n \
          \   from_kb = to_dict(from_kb_result)\n\n    # Сработала ветка с явно указанным\
          \ ответственным\n    if without_kb:\n        result = without_kb\n    #\
          \ Сработала ветка с назначением из базы знаний\n    elif from_kb:\n    \
          \    result = from_kb\n    else:\n        result = {\n            \"id\"\
          : \"\",\n            \"protocol_date\": \"\",\n            \"meeting_title\"\
          : \"\",\n            \"task\": \"\",\n            \"responsible\": \"\"\
          ,\n            \"department\": \"\",\n            \"zga\": \"\",\n     \
