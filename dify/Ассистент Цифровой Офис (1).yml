    - data:
        code: "import json\nimport re\nfrom datetime import datetime\n\n\ndef to_dict(value):\n\
          \    if isinstance(value, dict):\n        return value\n\n    if isinstance(value,\
          \ str):\n        text = value.strip()\n        text = text.replace(\"```json\"\
          , \"\").replace(\"```\", \"\").strip()\n\n        try:\n            parsed\
          \ = json.loads(text)\n            if isinstance(parsed, dict):\n       \
          \         return parsed\n        except Exception:\n            pass\n\n\
          \    return {}\n\n\ndef unwrap_item(value):\n    data = to_dict(value)\n\
          \n    if \"current_item\" in data and isinstance(data[\"current_item\"],\
          \ dict):\n        return data[\"current_item\"]\n\n    return data\n\n\n\
          def pick(item, *keys, default=\"\"):\n    for key in keys:\n        value\
          \ = item.get(key)\n        if value is not None and str(value).strip() !=\
          \ \"\":\n            return str(value).strip()\n    return default\n\n\n\
          def normalize_deadline(raw_due_date):\n    text = str(raw_due_date or \"\
          \").strip()\n\n    m = re.search(r\"(\\d{1,2})\\.(\\d{1,2})\\.(\\d{2,4}).*?(\\\
          d{1,2}):(\\d{2})\", text)\n    if m:\n        day = int(m.group(1))\n  \
          \      month = int(m.group(2))\n        year = int(m.group(3))\n       \
          \ hour = int(m.group(4))\n        minute = int(m.group(5))\n\n        if\
          \ year < 100:\n            year += 2000\n\n        return datetime(year,\
          \ month, day, hour, minute).strftime(\"%Y-%m-%dT%H:%M:%S\")\n\n    m = re.search(r\"\
          (\\d{1,2})\\.(\\d{1,2})\\.(\\d{2,4})\", text)\n    if m:\n        day =\
          \ int(m.group(1))\n        month = int(m.group(2))\n        year = int(m.group(3))\n\
          \n        if year < 100:\n            year += 2000\n\n        return datetime(year,\
          \ month, day, 18, 0).strftime(\"%Y-%m-%dT%H:%M:%S\")\n\n    return \"\"\n\
          \n\ndef main(current_item):\n    item = unwrap_item(current_item)\n\n  \
          \  responsible = pick(item, \"responsible\", \"raw_responsible\")\n    raw_due_date\
          \ = pick(item, \"due_date\", \"raw_due_date\")\n\n    return {\n       \
          \ \"id\": pick(item, \"id\"),\n        \"protocol_date\": pick(item, \"\
          protocol_date\"),\n        \"protocol_number\": pick(item, \"protocol_number\"\
          ),\n        \"meeting_title\": pick(item, \"meeting_title\"),\n        \"\
          task\": pick(item, \"task\", \"assignment\"),\n        \"raw_responsible\"\
          : responsible,\n        \"responsible\": responsible,\n        \"raw_due_date\"\
          : raw_due_date,\n        \"deadline\": normalize_deadline(raw_due_date),\n\
          \        \"department_hint\": pick(item, \"department_hint\", \"department\"\
          ),\n        \"source_fragment\": pick(item, \"source_fragment\"),\n    \
          \    \"has_explicit_responsible\": bool(responsible)\n    }"
