    - data:
        code: "import json\nimport re\n\n\ndef clean(value, default=\"\"):\n    if\
          \ value is None:\n        return default\n\n    text = str(value).strip()\n\
          \    return text if text else default\n\n\ndef normalize_protocol_number(value):\n\
          \    text = clean(value)\n\n    if not text:\n        return \"\"\n\n  \
          \  # Убираем символ №, потому что в DOCX-шаблоне он уже есть\n    text =\
          \ re.sub(r\"^\\s*№\\s*\", \"\", text)\n    text = re.sub(r\"^\\s*протокол\\\
          s*№?\\s*\", \"\", text, flags=re.IGNORECASE)\n\n    return text.strip()\n\
          \n\ndef main(\n    approver_position: str = \"\",\n    approver_name: str\
          \ = \"\",\n    reference_title: str = \"\",\n    task_title: str = \"\"\
          ,\n    reference_date: str = \"\",\n    protocol_number: str = \"\",\n \
          \   tasks_completed: str = \"\"\n) -> dict:\n\n    variables = {\n     \
          \   \"approver_position\": clean(approver_position),\n        \"approver_name\"\
          : clean(approver_name),\n        \"reference_title\": clean(reference_title,\
          \ \"ПРОТОКОЛ ВСТРЕЧИ\"),\n        \"task_title\": clean(task_title, \"По\
          \ итогам встречи\"),\n        \"reference_date\": clean(reference_date),\n\
          \        \"protocol_number\": normalize_protocol_number(protocol_number),\n\
          \        \"tasks_completed\": clean(tasks_completed)\n    }\n\n    return\
          \ {\n        \"docx_variables\": json.dumps(variables, ensure_ascii=False)\n\
          \    }"
        code_language: python3
